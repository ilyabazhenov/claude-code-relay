<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 432" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- popover -->
  <rect x="6" y="6" width="348" height="420" rx="14" fill="#F5F5F6" stroke="#E2E2E4" filter="url(#shadow)"/>

  <!-- ===== header ===== -->
  <circle cx="18" cy="26" r="4" fill="#34C759"/>
  <text x="28" y="30" font-size="15" font-weight="700" fill="#1D1D1F">Relay</text>
  <text x="330" y="30" font-size="9" fill="#A1A1A6" text-anchor="end">Updated 2 min ago</text>
  <text x="342" y="31" font-size="13" fill="#8E8E93" text-anchor="middle">&#8635;</text>

  <!-- ===== metric cards ===== -->
  <!-- 5-hour (blue) -->
  <rect x="12" y="40" width="106" height="74" rx="10" fill="#FFFFFF" stroke="#E7E7E9"/>
  <circle cx="26" cy="55" r="4.5" fill="none" stroke="#0A84FF" stroke-width="1.3"/>
  <line x1="26" y1="55" x2="26" y2="52.5" stroke="#0A84FF" stroke-width="1.1"/>
  <line x1="26" y1="55" x2="28" y2="55" stroke="#0A84FF" stroke-width="1.1"/>
  <text x="35" y="58" font-size="9" fill="#8E8E93" letter-spacing="0.4">5-HOUR</text>
  <text x="22" y="87" font-size="22" font-weight="500" fill="#0A84FF">42%</text>
  <text x="22" y="100" font-size="9" fill="#6E6E73">resets in 2h 10m</text>
  <rect x="22" y="104" width="86" height="5" rx="2.5" fill="#EDEDEF"/>
  <rect x="22" y="104" width="36" height="5" rx="2.5" fill="#0A84FF"/>

  <!-- Weekly (violet) -->
  <rect x="126" y="40" width="106" height="74" rx="10" fill="#FFFFFF" stroke="#E7E7E9"/>
  <rect x="136" y="51" width="8" height="7" rx="1.5" fill="none" stroke="#8C7ADB" stroke-width="1.2"/>
  <line x1="136" y1="53.5" x2="144" y2="53.5" stroke="#8C7ADB" stroke-width="1.2"/>
  <text x="149" y="58" font-size="9" fill="#8E8E93" letter-spacing="0.4">WEEKLY</text>
  <text x="136" y="87" font-size="22" font-weight="500" fill="#8C7ADB">18%</text>
  <text x="136" y="100" font-size="9" fill="#6E6E73">resets in 3d</text>
  <rect x="136" y="104" width="86" height="5" rx="2.5" fill="#EDEDEF"/>
  <rect x="136" y="104" width="16" height="5" rx="2.5" fill="#8C7ADB"/>

  <!-- Peak · 7d (amber identity, danger escalation → red) -->
  <rect x="240" y="40" width="108" height="74" rx="10" fill="#FFFFFF" stroke="#E35050" stroke-opacity="0.55"/>
  <path d="M251 57 q-3 -4 0 -8 q1 3 3 3 q2 -3 0 -6 q5 3 4 9 q0 4 -3.5 4 q-3.5 0 -3.5 -2 z" fill="#E8A23C"/>
  <text x="262" y="58" font-size="9" fill="#8E8E93" letter-spacing="0.4">PEAK · 7D</text>
  <text x="250" y="87" font-size="22" font-weight="500" fill="#E35050">87%</text>
  <text x="250" y="100" font-size="9" fill="#6E6E73">today 14–19</text>
  <rect x="250" y="104" width="88" height="5" rx="2.5" fill="#EDEDEF"/>
  <rect x="250" y="104" width="77" height="5" rx="2.5" fill="#E35050"/>

  <!-- ===== projection strip (amber) ===== -->
  <rect x="12" y="122" width="336" height="26" rx="8" fill="#E8A23C" fill-opacity="0.14"/>
  <path d="M24 129 l5 9 h-10 z" fill="#E8A23C"/>
  <circle cx="24" cy="135.5" r="0.9" fill="#FFFFFF"/>
  <text x="38" y="139" font-size="11" font-weight="600" fill="#B8791F">projected 100%</text>
  <text x="132" y="139" font-size="11" fill="#B8791F">~17:40 · in 46m</text>

  <!-- ===== peaks chart ===== -->
  <text x="12" y="166" font-size="11" fill="#6E6E73">Peaks</text>
  <rect x="52" y="157" width="70" height="14" rx="4" fill="#E9E9EB"/>
  <rect x="53" y="158" width="34" height="12" rx="3.5" fill="#FFFFFF" stroke="#DADADC"/>
  <text x="70" y="167" font-size="9" fill="#1D1D1F" text-anchor="middle">5h</text>
  <text x="104" y="167" font-size="9" fill="#8E8E93" text-anchor="middle">Week</text>
  <text x="348" y="167" font-size="9" fill="#8E8E93" text-anchor="end">8 windows · avg 39%</text>

  <!-- chart area: baseline y=252, top y=168, H=84 -->
  <!-- tracks -->
  <g fill="#EDEDEF">
    <rect x="12"     y="168" width="25.25" height="84" rx="2"/>
    <rect x="40.25"  y="168" width="25.25" height="84" rx="2"/>
    <rect x="68.5"   y="168" width="25.25" height="84" rx="2"/>
    <rect x="96.75"  y="168" width="25.25" height="84" rx="2"/>
    <rect x="125"    y="168" width="25.25" height="84" rx="2"/>
    <rect x="153.25" y="168" width="25.25" height="84" rx="2"/>
    <rect x="181.5"  y="168" width="25.25" height="84" rx="2"/>
    <rect x="209.75" y="168" width="25.25" height="84" rx="2"/>
    <rect x="238"    y="168" width="25.25" height="84" rx="2"/>
    <rect x="266.25" y="168" width="25.25" height="84" rx="2"/>
    <rect x="294.5"  y="168" width="25.25" height="84" rx="2"/>
    <rect x="322.75" y="168" width="25.25" height="84" rx="2"/>
  </g>
  <!-- bars (first 3 slots empty) -->
  <rect x="96.75"  y="233.5" width="25.25" height="18.5" rx="2" fill="#0A84FF"/>
  <rect x="125"    y="222.6" width="25.25" height="29.4" rx="2" fill="#0A84FF"/>
  <rect x="153.25" y="226.8" width="25.25" height="25.2" rx="2" fill="#0A84FF"/>
  <rect x="181.5"  y="205.8" width="25.25" height="46.2" rx="2" fill="#0A84FF"/>
  <rect x="209.75" y="217.6" width="25.25" height="34.4" rx="2" fill="#0A84FF"/>
  <rect x="238"    y="199.9" width="25.25" height="52.1" rx="2" fill="#0A84FF"/>
  <rect x="266.25" y="211.7" width="25.25" height="40.3" rx="2" fill="#0A84FF"/>
  <rect x="294.5"  y="178.9" width="25.25" height="73.1" rx="2" fill="#FF9F0A"/>
  <!-- current window (outlined, semi) -->
  <rect x="322.75" y="216.7" width="25.25" height="35.3" rx="2" fill="#0A84FF" fill-opacity="0.5" stroke="#0A84FF" stroke-width="1.4"/>
  <!-- reference lines -->
  <line x1="12" y1="170" x2="348" y2="170" stroke="#E35050" stroke-opacity="0.5" stroke-width="0.7" stroke-dasharray="4 3"/>
  <text x="12" y="180" font-size="9" fill="#E35050">100%</text>
  <line x1="12" y1="219.2" x2="348" y2="219.2" stroke="#8E8E93" stroke-opacity="0.6" stroke-width="0.7" stroke-dasharray="4 3"/>
  <text x="12" y="216" font-size="9" fill="#8E8E93">avg 39%</text>
  <text x="348" y="263" font-size="9" fill="#A1A1A6" text-anchor="end">now</text>

  <!-- ===== divider ===== -->
  <line x1="12" y1="272" x2="348" y2="272" stroke="#E2E2E4"/>

  <!-- ===== session list ===== -->
  <text x="14" y="288" font-size="10" fill="#8E8E93">&#9662;</text>
  <text x="26" y="288" font-size="11" fill="#6E6E73">Active sessions (3)</text>

  <!-- row 1: working (blue) -->
  <circle cx="30" cy="304" r="3.5" fill="#0A84FF"/>
  <text x="40" y="307" font-size="11" fill="#1D1D1F">relay</text>
  <rect x="66" y="298.5" width="34" height="12" rx="6" fill="#EAEAEC"/>
  <text x="83" y="307" font-size="9" fill="#6E6E73" text-anchor="middle">⑂ main</text>
  <text x="106" y="307" font-size="9" fill="#8E8E93">· update mockups</text>
  <text x="348" y="307" font-size="10" fill="#A1A1A6" text-anchor="end">working</text>

  <!-- row 2: waiting for reply (orange) -->
  <circle cx="30" cy="322" r="3.5" fill="#FF9F0A"/>
  <text x="40" y="325" font-size="11" fill="#1D1D1F">docs-site</text>
  <rect x="92" y="316.5" width="34" height="12" rx="6" fill="#EAEAEC"/>
  <text x="109" y="325" font-size="9" fill="#6E6E73" text-anchor="middle">⑂ main</text>
  <text x="348" y="325" font-size="10" fill="#FF9F0A" text-anchor="end">waiting for reply</text>

  <!-- row 3: waiting for approval (red) -->
  <circle cx="30" cy="340" r="3.5" fill="#E35050"/>
  <text x="40" y="343" font-size="11" fill="#1D1D1F">api-server</text>
  <rect x="97" y="334.5" width="44" height="12" rx="6" fill="#EAEAEC"/>
  <text x="119" y="343" font-size="9" fill="#6E6E73" text-anchor="middle">⑂ fix/auth</text>
  <text x="348" y="343" font-size="10" fill="#E35050" text-anchor="end">waiting for approval</text>

  <!-- ended group (collapsed) -->
  <text x="14" y="360" font-size="10" fill="#8E8E93">&#9656;</text>
  <text x="26" y="360" font-size="11" fill="#6E6E73">Recently ended (1)</text>

  <!-- ===== divider ===== -->
  <line x1="12" y1="370" x2="348" y2="370" stroke="#E2E2E4"/>

  <!-- ===== footer ===== -->
  <circle cx="18" cy="385" r="5" fill="#34C759"/>
  <path d="M15.6 385 l1.7 1.7 l3 -3.4" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="28" y="388" font-size="10" fill="#6E6E73">Hooks installed</text>
  <text x="110" y="388" font-size="10" fill="#A1A1A6">· 127.0.0.1:52431</text>

  <rect x="12" y="399" width="64" height="22" rx="6" fill="#FFFFFF" stroke="#D6D6D9"/>
  <text x="44" y="413" font-size="11" fill="#1D1D1F" text-anchor="middle">Settings…</text>
  <rect x="82" y="399" width="132" height="22" rx="6" fill="#FFFFFF" stroke="#D6D6D9"/>
  <text x="148" y="413" font-size="11" fill="#1D1D1F" text-anchor="middle">Check for Updates…</text>
  <rect x="306" y="399" width="42" height="22" rx="6" fill="#FFFFFF" stroke="#D6D6D9"/>
  <text x="327" y="413" font-size="11" fill="#1D1D1F" text-anchor="middle">Quit</text>
</svg>
